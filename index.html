<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Canal restreint – Urgence</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <!-- Leaflet pour la carte évolutive -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      background: #0b173b url('https://i.imgur.com/1pQvQqS.png') repeat;
      font-family: Tahoma, Verdana, sans-serif;
      color: #ffffff;
    }

    /* Watermark diagonal "ALERTE GÉNÉRALE" */
    body::before {
      content: "ALERTE GÉNÉRALE";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-30deg);
      font-size: 72px;
      color: rgba(255, 255, 255, 0.06);
      pointer-events: none;
      z-index: 0;
      white-space: nowrap;
    }

    .window {
      position: relative;
      width: 800px;
      margin: 30px auto;
      border: 2px solid #0055aa;
      background: #e0e8ff;
      color: #000;
      box-shadow: 0 0 10px #000;
      z-index: 1;
    }
    .titlebar {
      background: linear-gradient(#0b4fa8, #0b2f6a);
      color: #fff;
      padding: 6px 10px;
      font-weight: bold;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .titlebar-buttons span {
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-left: 4px;
      background: #c0c0c0;
      text-align: center;
      line-height: 16px;
      font-size: 11px;
      cursor: default;
    }
    .content {
      padding: 10px;
      display: flex;
      gap: 10px;
    }
    .left, .right {
      flex: 1;
    }

    .warning {
      background: #ffcccc;
      border: 1px solid #cc0000;
      color: #660000;
      padding: 8px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 12px;
    }

    /* Bandeau titre global (zetta) */
    #globalTitleBanner {
      display: none;
      background: #ffe0a0;
      border: 1px solid #cc8800;
      color: #663300;
      padding: 6px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 4px;
      font-size: 11px;
    }

    /* Bloc sous le bandeau : petites lignes aléatoires */
    .disclaimers {
      background: #ffecec;
      border: 1px solid #e0a0a0;
      color: #660000;
      padding: 6px 8px;
      font-size: 10px;
      margin-bottom: 10px;
    }
    .disclaimers div {
      margin-bottom: 2px;
    }

    .login-box {
      background: #f0f4ff;
      border: 1px solid #a0a0ff;
      padding: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .login-box select, .login-box input {
      width: 100%;
      margin-top: 4px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .login-box button {
      width: 100%;
      padding: 4px;
      font-size: 12px;
    }
    .chat-window {
      border: 1px solid #808080;
      background: #ffffff;
      height: 260px;
      overflow-y: auto;
      padding: 5px;
      font-size: 12px;
    }
    .chat-input {
      margin-top: 6px;
      display: flex;
      gap: 4px;
    }
    .chat-input input {
      flex: 1;
      font-size: 12px;
      padding: 3px;
    }
    .chat-input button {
      width: 80px;
      font-size: 12px;
    }
    .wizz-box {
      margin-top: 4px;
      text-align: right;
    }
    .wizz-box button {
      font-size: 11px;
      padding: 3px 8px;
    }
    .msg-me {
      color: #003399;
      margin-bottom: 3px;
    }
    .msg-system {
      color: #666666;
      font-style: italic;
      margin-bottom: 3px;
    }

    .map-box {
      border: 1px solid #808080;
      background: #ffffff;
      height: 320px;
    }
    #map {
      width: 100%;
      height: 100%;
    }

    .status-bar {
      background: #d0d0ff;
      padding: 4px 8px;
      font-size: 11px;
      border-top: 1px solid #808080;
    }

    /* Outils zetta */
    #zettaTools {
      display: none;
      margin-top: 8px;
      padding: 6px;
      background: #eef5ff;
      border: 1px dashed #6688cc;
      font-size: 11px;
    }
    #zettaTools textarea,
    #zettaTools input {
      width: 100%;
      font-size: 11px;
      margin-top: 3px;
      margin-bottom: 4px;
    }
    #zettaTools button {
      font-size: 11px;
      padding: 3px 6px;
      margin-right: 4px;
    }

    /* Effet Wizz (tremblement) */
    @keyframes wizz-shake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-4px, 2px); }
      40% { transform: translate(4px, -2px); }
      60% { transform: translate(-3px, 3px); }
      80% { transform: translate(3px, -3px); }
      100% { transform: translate(0, 0); }
    }
    .wizz-shake {
      animation: wizz-shake 0.4s ease-in-out;
    }
  </style>
</head>
<body>
  <div class="window" id="mainWindow">
    <div class="titlebar">
      <span>MSN Mesh – Canal restreint</span>
      <div class="titlebar-buttons">
        <span>_</span><span>[]</span><span>X</span>
      </div>
    </div>
    <div class="content">
      <div class="left">
        <!-- Bandeau principal -->
        <div class="warning">
          ALERTE GÉNÉRALE – NIVEAU MAXIMAL ATTEINT<br>
          Canal restreint : si tu écris ici, c’est que ça chauffe vraiment.
        </div>

        <!-- Message titre global (zetta) -->
        <div id="globalTitleBanner"></div>

        <!-- Petites lignes aléatoires sous le bandeau -->
        <div class="disclaimers" id="disclaimersBox">
          <!-- Rempli en JS -->
        </div>

        <div class="login-box" id="loginBox">
          <div><b>Connexion profil</b></div>

          <!-- Sélecteur de profil avec mode manuel -->
          <label>Profil :</label>
          <select id="profileSelect">
            <option value="">-- choisir un profil --</option>
            <option value="__manual__">⟵ saisir un nom manuellement</option>
            <option value="alpha">Alpha</option>
            <option value="bravo">Bravo</option>
            <option value="charlie">Charlie</option>
            <option value="delta">Delta</option>
            <!-- zetta caché -->
            <option value="zetta" style="display:none;">zetta</option>
          </select>

          <!-- Champ manuel -->
          <input type="text" id="manualProfileInput" placeholder="Nom du profil…" style="display:none;margin-top:4px;">

          <label>Mot de passe :</label>
          <input type="password" id="passwordInput" placeholder="Mot de passe">
          <button onclick="login()">Se connecter</button>
          <div id="loginStatus" style="margin-top:4px;color:#900;font-size:11px;"></div>
        </div>

        <div class="chat-window" id="chatWindow">
          <div class="msg-system">[Système] Connectez-vous pour envoyer des messages.</div>
        </div>
        <div class="chat-input">
          <input id="msgInput" type="text" placeholder="Tapez votre message..." disabled>
          <button onclick="sendMessage()" id="sendBtn" disabled>Envoyer</button>
        </div>

        <!-- Bouton Wizz -->
        <div class="wizz-box">
          <button id="wizzBtn" onclick="sendWizz()" disabled>Wizz</button>
        </div>

        <!-- Outils super-admin (zetta) -->
        <div id="zettaTools">
          <div><b>Outils maintenance (zetta)</b></div>
          <label>Titre global (bannière) :</label>
          <input type="text" id="globalTitleInput" placeholder="Message d’alerte global…">
          <button onclick="applyGlobalTitle()">Appliquer le titre global</button>
          <hr style="margin:6px 0;">
          <label>Réponse admin dans le fil :</label>
          <textarea id="zettaReplyInput" rows="3" placeholder="Message admin…"></textarea>
          <button onclick="sendZettaReply()">Envoyer dans le fil</button>
        </div>
      </div>

      <div class="right">
        <div class="map-box">
          <div id="map"></div>
        </div>
      </div>
    </div>
    <div class="status-bar" id="statusBar">
      Profil : non connecté – MQTT : connexion en cours…
    </div>
  </div>

  <script>
    // -----------------------------
    // Profils simples en dur
    // TODO: changer les mots de passe plus tard
    // -----------------------------
    const profiles = {
      "alpha": "alpha123",
      "bravo": "bravo123",
      "charlie": "charlie123",
      "delta": "delta123"
    };

    // Profil super-admin (zetta)
    // TODO: changer le mot de passe plus tard
    const ZETTA_PASSWORD = "zetta123";

    const ADMIN_PROFILES = ["alpha", "zetta"];
    const SUPER_ADMIN = "zetta";

    let currentProfile = null;
    let loginTime = 0;

    // -----------------------------
    // Gestion du mode manuel
    // -----------------------------
    document.getElementById('profileSelect').addEventListener('change', function () {
      const manual = document.getElementById('manualProfileInput');
      if (this.value === "__manual__") {
        manual.style.display = "block";
      } else {
        manual.style.display = "none";
      }
    });

    // -----------------------------
    // Pool de phrases "mentions légales débiles"
    // -----------------------------
    const disclaimerPool = [
      "Cette communication peut être surveillée. Ne mentionnez surtout pas l’emplacement du magot planqué. Surtout pas.",
      "Pour votre sécurité, évitez de parler du magot caché. Pour la nôtre aussi.",
      "Toute référence au magot enterré entraînera une coupure automatique du canal (ou pas).",
      "Coût d’une communication hors réseau : payable en bitcoin, café ou services rendus.",
      "Les surtaxes émotionnelles ne sont pas remboursées. Les frais de panique restent à votre charge.",
      "Toute réponse tardive peut entraîner une majoration en sarcasme.",
      "En utilisant ce canal, vous acceptez que le mesh ne soit pas responsable de vos décisions discutables.",
      "Si vous lisez ceci, c’est que la situation est grave… ou que vous aimez lire les petites lignes.",
      "Aucune garantie de bon sens n’est fournie avec ce service. Utilisation à vos risques et périls.",
      "Cette communication peut être analysée par une IA. Si tu dis une connerie, elle s’en souviendra plus longtemps que toi.",
      "Toute tentative de brouillage sera interprétée comme un aveu de culpabilité par l’algorithme. Ou comme un bug. On ne sait pas encore.",
      "Ce canal est susceptible d’être intercepté par des moyens de guerre électronique. Mais honnêtement, ils ont sûrement mieux à faire.",
      "Les paquets envoyés sur ce mesh peuvent être copiés, rejoués, disséqués et jugés par une IA légèrement rancunière.",
      "En poursuivant cette communication, vous acceptez que vos messages servent un jour d’exemple dans une présentation “à ne pas faire en situation de crise”.",
      "Toute phrase contenant les mots “plan”, “attaque” ou “magot” déclenche automatiquement une hausse de la tension artérielle de l’IA de surveillance.",
      "Ce système utilise des techniques avancées de guerre électronique. Enfin… surtout du MQTT et un peu de chance.",
      "Si vous avez l’impression d’être surveillé, rassurez-vous : ce n’est pas qu’une impression.",
      "Certains messages peuvent être utilisés pour entraîner une IA. Si elle devient plus intelligente que nous, ce sera en partie de votre faute."
    ];

    function pickRandomDisclaimers(count) {
      const poolCopy = [...disclaimerPool];
      const result = [];
      for (let i = 0; i < count && poolCopy.length > 0; i++) {
        const idx = Math.floor(Math.random() * poolCopy.length);
        result.push(poolCopy.splice(idx, 1)[0]);
      }
      return result;
    }

    function renderDisclaimers() {
      const box = document.getElementById('disclaimersBox');
      box.innerHTML = "";
      const selected = pickRandomDisclaimers(3);
      selected.forEach(text => {
        const div = document.createElement('div');
        div.textContent = text;
        box.appendChild(div);
      });
    }

    // -----------------------------
    // TOPIC MESH (à changer plus tard)
    // Topic par défaut "d'usine" : msh/0/json
    // -----------------------------
    const MESH_TOPIC = "msh/0/json";

    // -----------------------------
    // Connexion MQTT
    // -----------------------------
    const client = mqtt.connect("wss://mqtt.meshtastic.org:443");

    client.on('connect', function () {
      document.getElementById('statusBar').textContent =
        "Profil : non connecté – MQTT : connecté à mqtt.meshtastic.org";
      client.subscribe(MESH_TOPIC);
    });

    client.on('error', function () {
      document.getElementById('statusBar').textContent =
        "Profil : non connecté – MQTT : erreur de connexion";
    });

    client.on('message', function (topic, message) {
      if (topic !== MESH_TOPIC) return;
      try {
        const data = JSON.parse(message.toString());
        if (data.position && typeof data.position.latitude === "number") {
          const lat = data.position.latitude;
          const lon = data.position.longitude;
          updateCurrentPosition(lat, lon, "Position reçue via le réseau Mesh", 1);
        }
      } catch (e) {}
    });

    function addMessage(text, cssClass) {
      const chat = document.getElementById('chatWindow');
      const div = document.createElement('div');
      div.className = cssClass;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // -----------------------------
    // Telegram – à configurer
    // -----------------------------
    const TELEGRAM_BOT_TOKEN = "TON_BOT_TOKEN_ICI";
    const TELEGRAM_CHAT_ID   = "TON_CHAT_ID_ICI";

    function sendTelegramNotification(text) {
      if (!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID ||
          TELEGRAM_BOT_TOKEN.includes("TON_BOT") ||
          TELEGRAM_CHAT_ID.includes("TON_CHAT")) {
        return;
      }
      fetch("https://api.telegram.org/bot" + TELEGRAM_BOT_TOKEN + "/sendMessage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text })
      }).catch(() => {});
    }

    // -----------------------------
    // Helpers rôles
    // -----------------------------
    function isAdmin() {
      return ADMIN_PROFILES.includes(currentProfile);
    }

    function isSuperAdmin() {
      return currentProfile
