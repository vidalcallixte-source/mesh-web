<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MSN Mesh – Canal restreint</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      background: #0b173b url('https://i.imgur.com/1pQvQqS.png') repeat;
      font-family: Tahoma, Verdana, sans-serif;
      color: #ffffff;
    }
    /* ... tout ton CSS original (fenêtre MSN, chat, wizz, carte, outils zetta, etc.) ... */
  </style>
</head>
<body>
  <div class="window" id="mainWindow">
    <div class="titlebar">
      <span>MSN Mesh – Canal restreint</span>
      <div class="titlebar-buttons">
        <span>_</span><span>[]</span><span>X</span>
      </div>
    </div>  <script>
    // -----------------------------
    // Profils
    // -----------------------------
    const profiles = {
      "alpha": "alpha123",
      "bravo": "bravo123",
      "charlie": "charlie123",
      "delta": "delta123"
    };
    const ZETTA_PASSWORD = "zetta123";
    const ADMIN_PROFILES = ["alpha", "zetta"];
    const SUPER_ADMIN = "zetta";
    let currentProfile = null;
    let loginTime = 0;

    // -----------------------------
    // Disclaimers
    // -----------------------------
    const disclaimerPool = [
      "Cette communication peut être surveillée...",
      "Pour votre sécurité, évitez de parler du magot caché...",
      "Toute référence au magot enterré entraînera une coupure automatique...",
      "Coût d’une communication hors réseau : payable en bitcoin...",
      "Les surtaxes émotionnelles ne sont pas remboursées...",
      "Toute réponse tardive peut entraîner une majoration en sarcasme...",
      "En utilisant ce canal, vous acceptez que le mesh ne soit pas responsable...",
      "Si vous lisez ceci, c’est que la situation est grave...",
      "Aucune garantie de bon sens n’est fournie...",
      "Cette communication peut être analysée par une IA...",
      "Toute tentative de brouillage sera interprétée comme un aveu...",
      "Ce canal est susceptible d’être intercepté...",
      "Les paquets envoyés sur ce mesh peuvent être copiés...",
      "En poursuivant cette communication, vous acceptez que vos messages servent...",
      "Toute phrase contenant les mots “plan”, “attaque” ou “magot” déclenche...",
      "Ce système utilise des techniques avancées...",
      "Si vous avez l’impression d’être surveillé...",
      "Certains messages peuvent être utilisés pour entraîner une IA..."
    ];
    function pickRandomDisclaimers(count) {
      const poolCopy = [...disclaimerPool];
      const result = [];
      for (let i = 0; i < count && poolCopy.length > 0; i++) {
        const idx = Math.floor(Math.random() * poolCopy.length);
        result.push(poolCopy.splice(idx, 1)[0]);
      }
      return result;
    }
    function renderDisclaimers() {
      const box = document.getElementById('disclaimersBox');
      box.innerHTML = "";
      const selected = pickRandomDisclaimers(3);
      selected.forEach(text => {
        const div = document.createElement('div');
        div.textContent = text;
        box.appendChild(div);
      });
    }

    // -----------------------------
    // MQTT Mesh
    // -----------------------------
    const MESH_TOPIC = "msh/0/json";
    const client = mqtt.connect("wss://mqtt.meshtastic.org:443");

    client.on('connect', function () {
      document.getElementById('statusBar').textContent =
        "Profil : non connecté – MQTT : connecté à mqtt.meshtastic.org";
      client.subscribe(MESH_TOPIC);
    });
    client.on('error', function () {
      document.getElementById('statusBar').textContent =
        "Profil : non connecté – MQTT : erreur de connexion";
    });

    // --- Bloc 2 : Réception Mesh (positions + messages texte) ---
    client.on('message', function (topic, message) {
      if (topic !== MESH_TOPIC) return;
      try {
        const data = JSON.parse(message.toString());
        if (data.position) {
          updateCurrentPosition(data.position.latitude, data.position.longitude, "Position Mesh", 1);
        }
        if (data.text) {
          addMessage("[Mesh] " + data.text, "msg-system");
        }
      } catch (e) {
        console.error("Erreur MQTT:", e);
      }
    });

    function addMessage(text, cssClass) {
      const chat = document.getElementById('chatWindow');
      const div = document.createElement('div');
      div.className = cssClass;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // -----------------------------
    // Telegram
    // -----------------------------
    const TELEGRAM_BOT_TOKEN = "TON_BOT_TOKEN_ICI";
    const TELEGRAM_CHAT_ID   = "TON_CHAT_ID_ICI";
    function sendTelegramNotification(text) {
      if (!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID ||
          TELEGRAM_BOT_TOKEN.includes("TON_BOT") ||
          TELEGRAM_CHAT_ID.includes("TON_CHAT")) {
        return;
      }
      fetch("https://api.telegram.org/bot" + TELEGRAM_BOT_TOKEN + "/sendMessage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text })
      }).catch(() => {});
    }

    // --- Bloc 3 : Pont Telegram → Mesh/MSN (simulation côté client) ---
    function simulateTelegramReception(text) {
      client.publish(MESH_TOPIC, JSON.stringify({ text: text }));
      addMessage("[Telegram] " + text, "msg-system");
    }

    // -----------------------------
    // Helpers rôles
    // -----------------------------
    function isAdmin() { return ADMIN_PROFILES.includes(currentProfile); }
    function isSuperAdmin() { return currentProfile === SUPER_ADMIN; }

    // -----------------------------
    // Login
    // -----------------------------
    function login() {
      let profile = document.getElementById('profileSelect').value;
      const pwd = document.getElementById('passwordInput').value;
      const status = document.getElementById('loginStatus');

      if (!pwd) { status.textContent = "Entrez un mot de passe."; return; }
      if (pwd === ZETTA_PASSWORD) { profile = "zetta"; }
      if (!profile) { status.textContent = "Choisissez un profil."; return; }

      let ok = false;
      if (profile === "zetta") {
        if (pwd === ZETTA_PASSWORD) ok = true;
      } else if (profiles[profile] && profiles[profile] === pwd) {
        ok = true;
      }

      if (ok) {
        currentProfile = profile;
        loginTime = Date.now();
        status.style.color = "#060";
        status.textContent = "Connexion réussie.";
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        addMessage("[Système] Connecté en tant que " + profile, "msg-system");
        document.getElementById('statusBar').textContent =
          "Profil : " + profile + " – MQTT : connecté à mqtt.meshtastic.org";
        document.getElementById('wizzBtn').disabled = !isAdmin();
        document.getElementById('zettaTools').style.display = isSuperAdmin() ? "block" : "none";
        sendTelegramNotification("Connexion au canal restreint par le profil : " + profile);
        requestBrowserPositionOnce();
      } else {
        status.style.color = "#900";
        status.textContent = "Profil ou mot de passe incorrect.";
      }
    }
    // -----------------------------
    // Envoi de message
    // -----------------------------
    function sendMessage() {
      if (!currentProfile) {
        addMessage("[Système] Vous devez être connecté pour envoyer.", "msg-system");
        return;
      }
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage(currentProfile + " : " + text, "msg-me");

      const payload = JSON.stringify({ "text": text });
      client.publish(MESH_TOPIC, payload);

      sendTelegramNotification("[" + currentProfile + "] " + text);

      input.value = "";
    }

    // -----------------------------
    // Wizz (alpha + zetta)
    // -----------------------------
    const WIZZ_LIMIT_FIRST_MINUTE = 5;
    const WIZZ_LIMIT_PER_MINUTE = 3;
    let wizzCount = 0;
    let wizzWindowStart = 0;

    function canSendWizz() {
      const now = Date.now();
      if (!wizzWindowStart) { wizzWindowStart = now; wizzCount = 0; }
      const elapsedSinceLogin = now - loginTime;
      const elapsedWindow = now - wizzWindowStart;
      let limit;
      if (elapsedSinceLogin < 60000) {
        limit = WIZZ_LIMIT_FIRST_MINUTE;
      } else {
        if (elapsedWindow > 60000) { wizzWindowStart = now; wizzCount = 0; }
        limit = WIZZ_LIMIT_PER_MINUTE;
      }
      return wizzCount < limit;
    }

    function sendWizz() {
      if (!currentProfile || !isAdmin()) return;
      if (!canSendWizz()) {
        addMessage("[Système] Wizz limité, attends un peu.", "msg-system");
        return;
      }
      wizzCount++;
      addMessage("[WIZZ] " + currentProfile + " a envoyé un wizz !", "msg-system");
      const win = document.getElementById('mainWindow');
      win.classList.add('wizz-shake');
      setTimeout(() => win.classList.remove('wizz-shake'), 450);
      sendTelegramNotification("[WIZZ] " + currentProfile + " a envoyé un wizz !");
      const payload = JSON.stringify({ "text": "[WIZZ] " + currentProfile });
      client.publish(MESH_TOPIC, payload);
    }

    // -----------------------------
    // Outils super-admin (zetta)
    // -----------------------------
    function applyGlobalTitle() {
      if (!isSuperAdmin()) return;
      const txt = document.getElementById('globalTitleInput').value.trim();
      const banner = document.getElementById('globalTitleBanner');
      if (txt) { banner.textContent = txt; banner.style.display = "block"; }
      else { banner.textContent = ""; banner.style.display = "none"; }
    }

    function sendZettaReply() {
      if (!isSuperAdmin()) return;
      const txt = document.getElementById('zettaReplyInput').value.trim();
      if (!txt) return;
      addMessage("[ADMIN zetta] " + txt, "msg-system");
      const payload = JSON.stringify({ "text": "[ADMIN zetta] " + txt });
      client.publish(MESH_TOPIC, payload);
      sendTelegramNotification("[ADMIN zetta] " + txt);
      document.getElementById('zettaReplyInput').value = "";
    }

    // --- Bloc 4 : Mode ailleurs pour Zetta ---
    function setAilleursMode(profile) {
      if (profile === "zetta") {
        const fakeLat = (Math.random() * 140) - 70;
        const fakeLon = (Math.random() * 360) - 180;
        updateCurrentPosition(fakeLat, fakeLon, "Mode ailleurs activé", 1);
        addMessage("[Admin-Zetta] Position fictive affichée", "msg-system");
      }
    }

    // --- Bloc 5 : Alpha peut passer outre le masquage ---
    function getMarkerAt(latlng) { return currentMarker; } // simplifié
    if (map) {
      map.on('click', function(e) {
        if (currentProfile === "alpha") {
          const marker = getMarkerAt(e.latlng);
          if (marker && marker.hidden) {
            marker.hidden = false;
            addMessage("[Alpha] Masquage ignoré sur " + marker.id, "msg-system");
            sendTelegramNotification("[Privé] Alpha a ignoré le masquage sur " + marker.id);
          }
        }
      });
    }
    // -----------------------------
    // Carte Leaflet + historique 48h
    // -----------------------------
    let map;
    let currentMarker = null;
    let currentSourcePriority = Infinity; // 1 = mesh, 2 = GPS, 3 = box
    let historyPositions = [];
    let historyPolyline = null;

    function initMap() {
      map = L.map('map').setView([45.5, 3.1], 7);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);
    }

    function pruneHistory() {
      const now = Date.now();
      const cutoff = now - 48 * 60 * 60 * 1000;
      historyPositions = historyPositions.filter(p => p.time >= cutoff);
    }

    function redrawHistoryPolyline() {
      if (!map) return;
      if (historyPolyline) {
        map.removeLayer(historyPolyline);
        historyPolyline = null;
      }
      if (!isAdmin()) return;
      if (historyPositions.length > 1) {
        const latlngs = historyPositions.map(p => [p.lat, p.lon]);
        historyPolyline = L.polyline(latlngs, { color: 'red', weight: 3, opacity: 0.7 });
        historyPolyline.addTo(map);
      }
    }

    function addHistoryPoint(lat, lon) {
      const now = Date.now();
      historyPositions.push({ lat, lon, time: now });
      pruneHistory();
      redrawHistoryPolyline();
    }

    function updateCurrentPosition(lat, lon, sourceLabel, priority) {
      if (!map) return;
      if (priority >= currentSourcePriority) return;
      currentSourcePriority = priority;
      if (currentMarker) {
        map.removeLayer(currentMarker);
        currentMarker = null;
      }
      currentMarker = L.marker([lat, lon]).addTo(map).bindPopup(sourceLabel);
      currentMarker.openPopup();
      map.setView([lat, lon], 12);
      if (isAdmin()) { addHistoryPoint(lat, lon); }
    }

    // -----------------------------
    // Position navigateur (GPS / réseau)
    // -----------------------------
    let browserPositionRequested = false;
    function requestBrowserPositionOnce() {
      if (browserPositionRequested) return;
      browserPositionRequested = true;
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(
        pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const acc = pos.coords.accuracy || 0;
          if (acc > 1000) {
            updateCurrentPosition(lat, lon, "Pas d’appareil connecté. Position estimée via la box 4G", 3);
          } else {
            updateCurrentPosition(lat, lon, "Position GPS du téléphone", 2);
          }
        },
        err => {},
        { enableHighAccuracy: true, timeout: 5000 }
      );
    }

    // -----------------------------
    // Init
    // -----------------------------
    window.addEventListener('load', () => {
      renderDisclaimers();
      initMap();
    });
  </script>
</body>
</html>

    <div class="content">
      <div class="left">
        <!-- Alerte, bannière, disclaimers, login -->
        <!-- Chat window, input, wizz, outils zetta -->
      </div>
      <div class="right">
        <div class="map-box"><div id="map"></div></div>
      </div>
    </div>
    <div class="status-bar" id="statusBar">
      Profil : non connecté – MQTT : connexion en cours…
    </div>
  </div>
