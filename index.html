<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Canal restreint – Urgence</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <!-- Leaflet pour la carte évolutive -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      background: #0b173b url('https://i.imgur.com/1pQvQqS.png') repeat;
      font-family: Tahoma, Verdana, sans-serif;
      color: #ffffff;
    }

    /* Watermark diagonal "ALERTE GÉNÉRALE" */
    body::before {
      content: "ALERTE GÉNÉRALE";
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-30deg);
      font-size: 72px;
      color: rgba(255, 255, 255, 0.06);
      pointer-events: none;
      z-index: 0;
      white-space: nowrap;
    }

    .window {
      position: relative;
      width: 800px;
      margin: 30px auto;
      border: 2px solid #0055aa;
      background: #e0e8ff;
      color: #000;
      box-shadow: 0 0 10px #000;
      z-index: 1;
    }
    .titlebar {
      background: linear-gradient(#0b4fa8, #0b2f6a);
      color: #fff;
      padding: 6px 10px;
      font-weight: bold;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .titlebar-buttons span {
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-left: 4px;
      background: #c0c0c0;
      text-align: center;
      line-height: 16px;
      font-size: 11px;
      cursor: default;
    }
    .content {
      padding: 10px;
      display: flex;
      gap: 10px;
    }
    .left, .right {
      flex: 1;
    }

    .warning {
      background: #ffcccc;
      border: 1px solid #cc0000;
      color: #660000;
      padding: 8px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 4px;
      text-transform: uppercase;
      font-size: 12px;
    }

    /* Bloc sous le bandeau : petites lignes aléatoires */
    .disclaimers {
      background: #ffecec;
      border: 1px solid #e0a0a0;
      color: #660000;
      padding: 6px 8px;
      font-size: 10px;
      margin-bottom: 10px;
    }
    .disclaimers div {
      margin-bottom: 2px;
    }

    .login-box {
      background: #f0f4ff;
      border: 1px solid #a0a0ff;
      padding: 8px;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .login-box select, .login-box input {
      width: 100%;
      margin-top: 4px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .login-box button {
      width: 100%;
      padding: 4px;
      font-size: 12px;
    }
    .chat-window {
      border: 1px solid #808080;
      background: #ffffff;
      height: 260px;
      overflow-y: auto;
      padding: 5px;
      font-size: 12px;
    }
    .chat-input {
      margin-top: 6px;
      display: flex;
      gap: 4px;
    }
    .chat-input input {
      flex: 1;
      font-size: 12px;
      padding: 3px;
    }
    .chat-input button {
      width: 80px;
      font-size: 12px;
    }
    .msg-me {
      color: #003399;
      margin-bottom: 3px;
    }
    .msg-system {
      color: #666666;
      font-style: italic;
      margin-bottom: 3px;
    }

    .map-box {
      border: 1px solid #808080;
      background: #ffffff;
      height: 320px;
    }
    #map {
      width: 100%;
      height: 100%;
    }

    .status-bar {
      background: #d0d0ff;
      padding: 4px 8px;
      font-size: 11px;
      border-top: 1px solid #808080;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <span>MSN Mesh – Canal restreint</span>
      <div class="titlebar-buttons">
        <span>_</span><span>[]</span><span>X</span>
      </div>
    </div>
    <div class="content">
      <div class="left">
        <!-- Bandeau principal -->
        <div class="warning">
          ALERTE GÉNÉRALE – NIVEAU MAXIMAL ATTEINT<br>
          Canal restreint : si tu écris ici, c’est que ça chauffe vraiment.
        </div>

        <!-- Petites lignes aléatoires sous le bandeau -->
        <div class="disclaimers" id="disclaimersBox">
          <!-- Rempli en JS -->
        </div>

        <div class="login-box" id="loginBox">
          <div><b>Connexion profil</b></div>
          <label>Profil :</label>
          <select id="profileSelect">
            <option value="">-- choisir un profil --</option>
            <option value="alpha">Alpha</option>
            <option value="bravo">Bravo</option>
            <option value="charlie">Charlie</option>
            <option value="delta">Delta</option>
          </select>
          <label>Mot de passe :</label>
          <input type="password" id="passwordInput" placeholder="Mot de passe">
          <button onclick="login()">Se connecter</button>
          <div id="loginStatus" style="margin-top:4px;color:#900;font-size:11px;"></div>
        </div>

        <div class="chat-window" id="chatWindow">
          <div class="msg-system">[Système] Connectez-vous pour envoyer des messages.</div>
        </div>
        <div class="chat-input">
          <input id="msgInput" type="text" placeholder="Tapez votre message..." disabled>
          <button onclick="sendMessage()" id="sendBtn" disabled>Envoyer</button>
        </div>
      </div>

      <div class="right">
        <div class="map-box">
          <div id="map"></div>
        </div>
      </div>
    </div>
    <div class="status-bar" id="statusBar">
      Profil : non connecté – MQTT : connexion en cours…
    </div>
  </div>

  <script>
    // -----------------------------
    // Profils simples en dur
    // -----------------------------
    const profiles = {
      "alpha": "alpha123",
      "bravo": "bravo123",
      "charlie": "charlie123",
      "delta": "delta123"
    };

    let currentProfile = null;

    // -----------------------------
    // Pool de phrases "mentions légales débiles"
    // -----------------------------
    const disclaimerPool = [
      // Série 1
      "Cette communication peut être surveillée. Ne mentionnez surtout pas l’emplacement du magot planqué. Surtout pas.",
      "Pour votre sécurité, évitez de parler du magot caché. Pour la nôtre aussi.",
      "Toute référence au magot enterré entraînera une coupure automatique du canal (ou pas).",
      // Série 2
      "Coût d’une communication hors réseau : payable en bitcoin, café ou services rendus.",
      "Les surtaxes émotionnelles ne sont pas remboursées. Les frais de panique restent à votre charge.",
      "Toute réponse tardive peut entraîner une majoration en sarcasme.",
      // Série 3
      "En utilisant ce canal, vous acceptez que le mesh ne soit pas responsable de vos décisions discutables.",
      "Si vous lisez ceci, c’est que la situation est grave… ou que vous aimez lire les petites lignes.",
      "Aucune garantie de bon sens n’est fournie avec ce service. Utilisation à vos risques et périls.",
      // Série 4 – IA / guerre électronique
      "Cette communication peut être analysée par une IA. Si tu dis une connerie, elle s’en souviendra plus longtemps que toi.",
      "Toute tentative de brouillage sera interprétée comme un aveu de culpabilité par l’algorithme. Ou comme un bug. On ne sait pas encore.",
      "Ce canal est susceptible d’être intercepté par des moyens de guerre électronique. Mais honnêtement, ils ont sûrement mieux à faire.",
      "Les paquets envoyés sur ce mesh peuvent être copiés, rejoués, disséqués et jugés par une IA légèrement rancunière.",
      "En poursuivant cette communication, vous acceptez que vos messages servent un jour d’exemple dans une présentation “à ne pas faire en situation de crise”.",
      "Toute phrase contenant les mots “plan”, “attaque” ou “magot” déclenche automatiquement une hausse de la tension artérielle de l’IA de surveillance.",
      "Ce système utilise des techniques avancées de guerre électronique. Enfin… surtout du MQTT et un peu de chance.",
      "Si vous avez l’impression d’être surveillé, rassurez-vous : ce n’est pas qu’une impression.",
      "Certains messages peuvent être utilisés pour entraîner une IA. Si elle devient plus intelligente que nous, ce sera en partie de votre faute."
    ];

    function pickRandomDisclaimers(count) {
      const poolCopy = [...disclaimerPool];
      const result = [];
      for (let i = 0; i < count && poolCopy.length > 0; i++) {
        const idx = Math.floor(Math.random() * poolCopy.length);
        result.push(poolCopy.splice(idx, 1)[0]);
      }
      return result;
    }

    function renderDisclaimers() {
      const box = document.getElementById('disclaimersBox');
      box.innerHTML = "";
      const selected = pickRandomDisclaimers(3);
      selected.forEach(text => {
        const div = document.createElement('div');
        div.textContent = text;
        box.appendChild(div);
      });
    }

    // -----------------------------
    // Connexion MQTT
    // -----------------------------
    const client = mqtt.connect("wss://mqtt.meshtastic.org:443");

    client.on('connect', function () {
      document.getElementById('statusBar').textContent =
        "Profil : non connecté – MQTT : connecté à mqtt.meshtastic.org";
    });

    client.on('error', function () {
      document.getElementById('statusBar').textContent =
        "Profil : non connecté – MQTT : erreur de connexion";
    });

    function addMessage(text, cssClass) {
      const chat = document.getElementById('chatWindow');
      const div = document.createElement('div');
      div.className = cssClass;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // -----------------------------
    // Telegram – à configurer
    // -----------------------------
    const TELEGRAM_BOT_TOKEN = "TON_BOT_TOKEN_ICI";
    const TELEGRAM_CHAT_ID   = "TON_CHAT_ID_ICI";

    function sendTelegramNotification(text) {
      if (!TELEGRAM_BOT_TOKEN || !TELEGRAM_CHAT_ID ||
          TELEGRAM_BOT_TOKEN.includes("TON_BOT") ||
          TELEGRAM_CHAT_ID.includes("TON_CHAT")) {
        // Pas configuré, on ignore silencieusement
        return;
      }
      fetch("https://api.telegram.org/bot" + TELEGRAM_BOT_TOKEN + "/sendMessage", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT_ID,
          text: text
        })
      }).catch(() => {});
    }

    // -----------------------------
    // Login
    // -----------------------------
    function login() {
      const profile = document.getElementById('profileSelect').value;
      const pwd = document.getElementById('passwordInput').value;
      const status = document.getElementById('loginStatus');

      if (!profile) {
        status.textContent = "Choisissez un profil.";
        return;
      }
      if (!pwd) {
        status.textContent = "Entrez un mot de passe.";
        return;
      }
      if (profiles[profile] && profiles[profile] === pwd) {
        currentProfile = profile;
        status.style.color = "#060";
        status.textContent = "Connexion réussie.";
        document.getElementById('msgInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        addMessage("[Système] Connecté en tant que " + profile, "msg-system");
        document.getElementById('statusBar').textContent =
          "Profil : " + profile + " – MQTT : connecté à mqtt.meshtastic.org";

        // Exemple : notif Telegram à la connexion
        sendTelegramNotification("Connexion au canal restreint par le profil : " + profile);

        // Plus tard : ici on pourra afficher ton marker + trajet 48h sur la carte
      } else {
        status.style.color = "#900";
        status.textContent = "Profil ou mot de passe incorrect.";
      }
    }

    // -----------------------------
    // Envoi de message
    // -----------------------------
    function sendMessage() {
      if (!currentProfile) {
        addMessage("[Système] Vous devez être connecté pour envoyer.", "msg-system");
        return;
      }
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;

      // Affichage local
      addMessage(currentProfile + " : " + text, "msg-me");

      // Payload pour Meshtastic (texte simple)
      const payload = JSON.stringify({ "text": text });

      // TODO : adapte le topic à ton canal réel
      client.publish("msh/FR/tonchannel/2/json", payload);

      // Exemple : notif Telegram à chaque message
      sendTelegramNotification("[" + currentProfile + "] " + text);

      input.value = "";
    }

    // -----------------------------
    // Carte Leaflet (base)
    // -----------------------------
    let map;

    function initMap() {
      map = L.map('map').setView([45.5, 3.1], 7); // centre approximatif Auvergne

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap'
      }).addTo(map);

      // Plus tard : on ajoutera ici
      // - ton icône skate / canne à pêche
      // - l’icône 3008
      // - le tracé des 48 dernières heures
      // - visibles seulement après login
    }

    // -----------------------------
    // Init au chargement
    // -----------------------------
    window.addEventListener('load', () => {
      renderDisclaimers();
      initMap();
    });
  </script>
</body>
</html>
